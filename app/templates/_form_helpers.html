{% macro render_field(field) -%}
  <div class="mb-3">
    {{ field.label(class="form-label") }}
    {{ field(class="form-control") }}
    {% if field.errors %}
      <div class="text-danger small mt-1">
        {% for e in field.errors %}<div>{{ e }}</div>{% endfor %}
      </div>
    {% endif %}
  </div>
{%- endmacro %}
