{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>Login</h1>
<form method="post">
  {{ form.csrf_token }}
  <label>Email</label> {{ form.email() }} <br>
  <label>Password</label> {{ form.password() }} <br><br>
  {{ form.submit() }}
</form>
<p>No account? <a href="{{ url_for('auth.register') }}">Register</a></p>
{% endblock %}
