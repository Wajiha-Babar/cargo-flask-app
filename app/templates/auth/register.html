{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h1>Register</h1>
<form method="post">
  {{ form.csrf_token }}
  <label>Name</label> {{ form.name() }} <br>
  <label>Email</label> {{ form.email() }} <br>
  <label>Password</label> {{ form.password() }} <br>
  <label>Plan</label> {{ form.plan() }} <br><br>
  {{ form.submit() }}
</form>
<p>Already have account? <a href="{{ url_for('auth.login') }}">Login</a></p>
{% endblock %}
